<!DOCTYPE html>
<html>
<head>
<title>Class 6 Daily Notes</title>

<style>
body{
font-family: Arial;
margin:0;
background:#eef2ff;
}

header{
background:#4a6cf7;
color:white;
text-align:center;
padding:15px;
}

nav{
background:#333;
text-align:center;
padding:10px;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

.container{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

input{
padding:8px;
width:100%;
margin-bottom:10px;
}

button{
background:#4a6cf7;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
}

.note{
background:#f5f7ff;
padding:10px;
margin-top:15px;
border-radius:8px;
}

.note-image{
width:200px;
cursor:pointer;
transition:0.3s;
margin-top:10px;
border-radius:5px;
}

.note-image:hover{
transform:scale(1.05);
}
</style>

</head>

<body>

<header>
<h1>Class 6 Daily Notes Hub</h1>
<p>Helping students and parents</p>
</header>

<nav>
<a href="#" onclick="showHome()">Home</a>
<a href="#" onclick="showUpload()">Upload Notes</a>
<a href="#" onclick="showNotes()">Daily Notes</a>
</nav>

<div class="container" id="content"></div>

<script>

function showHome(){
document.getElementById("content").innerHTML = `
<h2>Welcome</h2>
<p>This platform helps Class 6 students access daily classwork and homework.</p>
<p>If a student misses school or forgets a book, notes can be checked here.</p>
`;
}

function showUpload(){
document.getElementById("content").innerHTML = `
<h2>Upload Notes</h2>

<label>Date</label>
<input type="date" id="date">

<label>Subject</label>
<input type="text" id="subject">

<label>Notes</label>
<input type="text" id="notes">

<label>Upload Notebook Photo</label>
<input type="file" id="photo" accept="image/*">

<label>Parent Name</label>
<input type="text" id="parent">

<button onclick="saveNote()">Upload</button>
`;
}

function showNotes(){
let notes = JSON.parse(localStorage.getItem("classNotes")) || [];

notes.sort((a, b) => new Date(b.date) - new Date(a.date));

let html = "<h2>Daily Notes</h2>";

notes.forEach((note, index) => {
html += `
<div class="note">
<b>Date:</b> ${note.date}<br>
<b>Subject:</b> ${note.subject}<br>
<b>Notes:</b> ${note.notes}<br>
<b>Uploaded by:</b> ${note.parent}<br>
${note.image ? `<img src="${note.image}" class="note-image" onclick="openImage('${note.image}')">` : ""}
<br><br>
<button onclick="deleteNote(${index})">Delete</button>
</div>
`;
});

document.getElementById("content").innerHTML = html;
}

function saveNote(){
let file = document.getElementById("photo").files[0];
let reader = new FileReader();

reader.onload = function(){

let note = {
date: document.getElementById("date").value,
subject: document.getElementById("subject").value,
notes: document.getElementById("notes").value,
parent: document.getElementById("parent").value,
image: reader.result
};

let storedNotes = JSON.parse(localStorage.getItem("classNotes")) || [];
storedNotes.push(note);

localStorage.setItem("classNotes", JSON.stringify(storedNotes));

alert("Notes uploaded successfully!");
showNotes();
};

if(file){
reader.readAsDataURL(file);
} else {

let note = {
date: document.getElementById("date").value,
subject: document.getElementById("subject").value,
notes: document.getElementById("notes").value,
parent: document.getElementById("parent").value,
image: null
};

let storedNotes = JSON.parse(localStorage.getItem("classNotes")) || [];
storedNotes.push(note);

localStorage.setItem("classNotes", JSON.stringify(storedNotes));

alert("Notes uploaded successfully!");
showNotes();
}
}

function deleteNote(index){
if(confirm("Are you sure you want to delete this note?")){
let notes = JSON.parse(localStorage.getItem("classNotes")) || [];
notes.splice(index,1);
localStorage.setItem("classNotes", JSON.stringify(notes));
showNotes();
}
}

function openImage(src){
let viewer = document.createElement("div");

viewer.style.position = "fixed";
viewer.style.top = "0";
viewer.style.left = "0";
viewer.style.width = "100%";
viewer.style.height = "100%";
viewer.style.background = "rgba(0,0,0,0.8)";
viewer.style.display = "flex";
viewer.style.alignItems = "center";
viewer.style.justifyContent = "center";

viewer.innerHTML = `
<img src="${src}" style="max-width:90%; max-height:90%; border-radius:10px;">
`;

viewer.onclick = function(){
document.body.removeChild(viewer);
};

document.body.appendChild(viewer);
}

showHome();

</script>

</body>
</html>
