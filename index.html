<!DOCTYPE html>
<html>
<head>
<title>Class 6 Daily Notes</title>

<style>
body{
font-family: Arial;
margin:0;
background:#eef2ff;
}

header{
background:#4a6cf7;
color:white;
text-align:center;
padding:15px;
}

nav{
background:#333;
text-align:center;
padding:10px;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

.container{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

input{
padding:8px;
width:100%;
margin-bottom:10px;
}

button{
background:#4a6cf7;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
}

.note{
background:#f5f7ff;
padding:10px;
margin-top:15px;
border-radius:8px;
}

.note-image{
width:200px;
cursor:pointer;
margin-top:10px;
border-radius:5px;
}
</style>

</head>

<body>

<header>
<h1>Class 6 Daily Notes Hub</h1>
<p>Helping students and parents</p>
</header>

<nav>
<a onclick="showHome()">Home</a>
<a onclick="showUpload()">Upload Notes</a>
<a onclick="showNotes()">Daily Notes</a>
</nav>

<div class="container" id="content"></div>

<script>

function showHome(){
document.getElementById("content").innerHTML = `
<h2>Welcome</h2>
<p>This platform helps Class 6 students access daily classwork and homework.</p>
`;
}

function showUpload(){
document.getElementById("content").innerHTML = `
<h2>Upload Notes</h2>

<label>Date</label>
<input type="date" id="date">

<label>Subject</label>
<input type="text" id="subject">

<label>Notes</label>
<input type="text" id="notes">

<label>Upload Notebook Photos</label>
<input type="file" id="photo" accept="image/*" multiple>

<label>Parent Name</label>
<input type="text" id="parent">

<button onclick="saveNote()">Upload</button>
`;
}

async function saveNote(){

let files = document.getElementById("photo").files;
let images = [];

for(let i=0;i<files.length;i++){
let reader = new FileReader();

await new Promise(resolve=>{
reader.onload=function(e){
images.push(e.target.result);
resolve();
}
reader.readAsDataURL(files[i]);
});
}

await addDoc(collection(db, "notes"), {
date: document.getElementById("date").value,
subject: document.getElementById("subject").value,
notes: document.getElementById("notes").value,
parent: document.getElementById("parent").value,
images: images
});

alert("Notes uploaded successfully!");
showNotes();

}

async function showNotes(){

let html = "<h2>Daily Notes</h2>";

const querySnapshot = await getDocs(collection(db, "notes"));

querySnapshot.forEach((docItem) => {

let note = docItem.data();
let imagesHTML="";

if(note.images){
note.images.forEach(img=>{
imagesHTML += `<img src="${img}" class="note-image" onclick="openImage('${img}')">`;
});
}

html += `
<div class="note">
<b>Date:</b> ${note.date}<br>
<b>Subject:</b> ${note.subject}<br>
<b>Notes:</b> ${note.notes}<br>
<b>Uploaded by:</b> ${note.parent}<br>
${imagesHTML}
<br><br>
<button onclick="deleteNote('${docItem.id}')">Delete</button>
</div>
`;

});

document.getElementById("content").innerHTML = html;

}

async function deleteNote(id){
await deleteDoc(doc(db, "notes", id));
showNotes();
}

function openImage(src){
let viewer = document.createElement("div");

viewer.style.position="fixed";
viewer.style.top="0";
viewer.style.left="0";
viewer.style.width="100%";
viewer.style.height="100%";
viewer.style.background="rgba(0,0,0,0.8)";
viewer.style.display="flex";
viewer.style.alignItems="center";
viewer.style.justifyContent="center";

viewer.innerHTML=`<img src="${src}" style="max-width:90%; max-height:90%">`;

viewer.onclick=function(){
document.body.removeChild(viewer);
};

document.body.appendChild(viewer);
}

showHome();

</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCf0dJcAQ_owKkhePBPQWw5RHmNhImgPSg",
authDomain: "class6-notes.firebaseapp.com",
projectId: "class6-notes",
storageBucket: "class6-notes.firebasestorage.app",
messagingSenderId: "392541164978",
appId: "1:392541164978:web:d3b86d768be2eae87b00ab",
measurementId: "G-MJZ09QFZHR"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.deleteDoc = deleteDoc;
window.doc = doc;
</script>

</body>
</html>
