<script>

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCf0dJcAQ_owKkhePBPQWw5RHmNhImgPSg",
  authDomain: "class6-notes.firebaseapp.com",
  projectId: "class6-notes",
  storageBucket: "class6-notes.firebasestorage.app",
  messagingSenderId: "392541164978",
  appId: "1:392541164978:web:b4c68fcd3260f96d7b00ab"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

// HOME
function showHome(){
document.getElementById("content").innerHTML = `
<h2>Welcome</h2>
<p>This website helps Class 6 students access daily classwork and homework.</p>
`;
}

// UPLOAD PAGE
function showUpload(){
document.getElementById("content").innerHTML = `
<h2>Upload Notes</h2>

<label>Date</label>
<input type="date" id="date">

<label>Subject</label>
<select id="subject">
<option value="">Select Subject</option>
<option>Math</option>
<option>Science</option>
<option>English</option>
<option>Social</option>
<option>Computer</option>
<option>Hindi</option>
<option>Telugu</option>
<option>Other</option>
</select>

<label>Notes</label>
<input type="text" id="notes">

<label>Upload Photos</label>
<input type="file" id="photo" multiple>

<label>Parent Name</label>
<input type="text" id="parent">

<button onclick="saveNote()">Upload Notes</button>
`;
}

// SAVE NOTE
async function saveNote(){

let date = document.getElementById("date").value;
let subject = document.getElementById("subject").value;
let notes = document.getElementById("notes").value;
let parent = document.getElementById("parent").value;
let files = document.getElementById("photo").files;

if(date=="" || subject=="" || notes=="" || parent==""){
alert("Please fill all fields");
return;
}

let imageUrls = [];

for(let file of files){
let storageRef = storage.ref("notes/"+Date.now()+file.name);
await storageRef.put(file);
let url = await storageRef.getDownloadURL();
imageUrls.push(url);
}

await db.collection("notes").add({
date,
subject,
notes,
parent,
images:imageUrls
});

alert("Notes uploaded successfully!");

// Clear form
document.getElementById("date").value = "";
document.getElementById("subject").value = "";
document.getElementById("notes").value = "";
document.getElementById("parent").value = "";
document.getElementById("photo").value = "";

// Go to notes page
loadNotes();
}

// ✅ FIXED LOAD NOTES
async function loadNotes(){
try{

let snapshot = await db.collection("notes").get();

// ✅ CHECK snapshot
if(!snapshot){
document.getElementById("content").innerHTML = "No data found";
return;
}

let html = `<h2>Daily Notes</h2>`;

// ✅ CHECK empty
if(snapshot.empty){
html += "<p>No notes uploaded yet.</p>";
document.getElementById("content").innerHTML = html;
return;
}

// ✅ SAFE LOOP
snapshot.docs.forEach(doc => {

let note = doc.data();

if(!note) return;

html += `
<div class="note">
<b>Date:</b> ${note.date || ""}<br>
<b>Subject:</b> ${note.subject || ""}<br>
<b>Notes:</b> ${note.notes || ""}<br>
<b>Parent:</b> ${note.parent || ""}<br>
`;

// ✅ SAFE images
if(note.images && Array.isArray(note.images)){
note.images.forEach(img=>{
html += `<img src="${img}" class="note-image">`;
});
}

html += `</div>`;
});

document.getElementById("content").innerHTML = html;

}catch(error){
console.error("ERROR:", error);
alert("Error loading notes. Check console.");
}
}
// START
showHome();

</script>
