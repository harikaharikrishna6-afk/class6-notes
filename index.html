<!DOCTYPE html>
<html>
<head>
<title>Class 6 Daily Notes</title>

<style>
body{
font-family: Arial;
margin:0;
background:#eef2ff;
}

header{
background:#4a6cf7;
color:white;
text-align:center;
padding:18px;
}

nav{
background:#333;
text-align:center;
padding:10px;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

.container{
background:white;
margin:20px;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input, select{
padding:8px;
width:100%;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#4a6cf7;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:6px;
margin-top:5px;
}

.note{
background:#f5f7ff;
padding:12px;
margin-top:15px;
border-radius:10px;
}

.note-image{
width:200px;
margin:6px;
border-radius:6px;
cursor:pointer;
}

.tools{
margin-bottom:15px;
}

.thank{
background:#28a745;
}
</style>

</head>

<body>

<header>
<h1>Class 6 Daily Notes Hub</h1>
<p>Helping students and parents stay updated</p>
</header>

<nav>
<a href="#" onclick="showHome()">Home</a>
<a href="#" onclick="showUpload()">Upload Notes</a>
<a href="#" onclick="loadNotes()">Daily Notes</a>
</nav>

<div class="container" id="content"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCf0dJcAQ_owKkhePBPQWw5RHmNhImgPSg",
  authDomain: "class6-notes.firebaseapp.com",
  projectId: "class6-notes",
  storageBucket: "class6-notes.firebasestorage.app",
  messagingSenderId: "392541164978",
  appId: "1:392541164978:web:b4c68fcd3260f96d7b00ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

window.showHome = function(){
document.getElementById("content").innerHTML = `
<h2>Welcome</h2>
<p>This website helps Class 6 students access daily classwork and homework.</p>
`;
}

window.showUpload = function(){
document.getElementById("content").innerHTML = `
<h2>Upload Notes</h2>

<label>Date</label>
<input type="date" id="date">

<label>Subject</label>
<select id="subject">
<option value="">Select Subject</option>
<option>Math</option>
<option>Science</option>
<option>English</option>
<option>Social</option>
<option>Computer</option>
<option>Hindi</option>
<option>Telugu</option>
<option>Other</option>
</select>

<label>Notes</label>
<input type="text" id="notes">

<label>Upload Photos</label>
<input type="file" id="photo" multiple>

<label>Parent Name</label>
<input type="text" id="parent">

<button onclick="saveNote()">Upload Notes</button>
`;
}

window.saveNote = async function(){

let date = document.getElementById("date").value;
let subject = document.getElementById("subject").value;
let notes = document.getElementById("notes").value;
let parent = document.getElementById("parent").value;
let files = document.getElementById("photo").files;

if(date=="" || subject=="" || notes=="" || parent==""){
alert("Please fill all fields");
return;
}

let imageUrls = [];

for(let file of files){
let storageRef = ref(storage, "notes/"+Date.now()+file.name);
await uploadBytes(storageRef, file);
let url = await getDownloadURL(storageRef);
imageUrls.push(url);
}

await addDoc(collection(db,"notes"),{
date,
subject,
notes,
parent,
images:imageUrls,
thanks:0
});

alert("Notes uploaded successfully!");
loadNotes();
}

window.loadNotes = async function(){

const querySnapshot = await getDocs(collection(db,"notes"));

let html = `
<h2>Daily Notes</h2>

<div class="tools">
<input type="text" id="search" placeholder="Search..." onkeyup="filterNotes()">

<select id="filter" onchange="filterNotes()">
<option value="all">All Subjects</option>
<option value="math">Math</option>
<option value="science">Science</option>
<option value="english">English</option>
<option value="social">Social</option>
<option value="computer">Computer</option>
<option value="hindi">Hindi</option>
<option value="telugu">Telugu</option>
</select>
</div>
`;

querySnapshot.forEach((docSnap)=>{
let note = docSnap.data();
let id = docSnap.id;

html += `
<div class="note" data-subject="${note.subject.toLowerCase()}">
<b>Date:</b> ${note.date}<br>
<b>Subject:</b> ${note.subject}<br>
<b>Notes:</b> ${note.notes}<br>
<b>Parent:</b> ${note.parent}<br>
<b>Thanks:</b> ${note.thanks}<br>
`;

note.images.forEach(img=>{
html += `<img src="${img}" class="note-image">`;
});

html += `
<br>
<button class="thank" onclick="thankNote('${id}',${note.thanks})">Thank You ❤️</button>
<button onclick="deleteNote('${id}')">Delete</button>
</div>
`;
});

document.getElementById("content").innerHTML = html;
}

window.filterNotes = function(){

let search = document.getElementById("search").value.toLowerCase();
let subject = document.getElementById("filter").value;
let notes = document.querySelectorAll(".note");

notes.forEach(note=>{
let text = note.innerText.toLowerCase();
let noteSubject = note.dataset.subject;

let matchSearch = text.includes(search);
let matchSubject = subject==="all" || noteSubject.includes(subject);

note.style.display = (matchSearch && matchSubject) ? "block" : "none";
});
}

window.thankNote = async function(id,thanks){
const noteRef = doc(db,"notes",id);
await updateDoc(noteRef,{thanks:thanks+1});
loadNotes();
}

window.deleteNote = async function(id){
if(confirm("Delete this note?")){
await deleteDoc(doc(db,"notes",id));
loadNotes();
}
}

showHome();

</script>

</body>
</html>
