<!DOCTYPE html>
<html>
<head>
<title>Class6 Daily Notes</title>

<style>
body{
font-family: Arial;
margin:0;
background:#eef2ff;
}

header{
background:#4a6cf7;
color:white;
text-align:center;
padding:18px;
}

nav{
background:#333;
text-align:center;
padding:10px;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

.container{
background:white;
margin:20px;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input, select{
padding:8px;
width:100%;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#4a6cf7;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:6px;
margin-top:5px;
}

.note{
background:#f5f7ff;
padding:12px;
margin-top:15px;
border-radius:10px;
}

.note-image{
width:200px;
margin:6px;
border-radius:6px;
}
</style>
</head>

<body>

<header>
<h1>Class 6 Daily Notes Hub</h1>
<p>Helping students and parents stay updated</p>
</header>

<nav>
<a onclick="showHome()">Home</a>
<a onclick="showUpload()">Upload Notes</a>
<a onclick="loadNotes()">Daily Notes</a>
</nav>

<div class="container" id="content"></div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCf0dJcAQ_owKkhePBPQWw5RHmNhImgPSg",
  authDomain: "class6-notes.firebaseapp.com",
  projectId: "class6-notes",
  storageBucket: "class6-notes.firebasestorage.app",
  messagingSenderId: "392541164978",
  appId: "1:392541164978:web:b4c68fcd3260f96d7b00ab"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

// HOME
function showHome(){
document.getElementById("content").innerHTML = `
<h2>Welcome</h2>
<p>This website helps Class 6 students access daily classwork and homework.</p>
`;
}

// UPLOAD PAGE
function showUpload(){
document.getElementById("content").innerHTML = `
<h2>Upload Notes</h2>

<label>Date</label>
<input type="date" id="date">

<label>Subject</label>
<select id="subject">
<option value="">Select Subject</option>
<option>Math</option>
<option>Science</option>
<option>English</option>
<option>Social</option>
<option>Computer</option>
<option>Hindi</option>
<option>Telugu</option>
<option>Other</option>
</select>

<label>Notes</label>
<input type="text" id="notes">

<label>Upload Photos</label>
<input type="file" id="photo" multiple>

<label>Parent Name</label>
<input type="text" id="parent">

<button onclick="saveNote()">Upload Notes</button>
`;
}

// SAVE NOTE
async function saveNote(){

let date = document.getElementById("date").value;
let subject = document.getElementById("subject").value;
let notes = document.getElementById("notes").value;
let parent = document.getElementById("parent").value;
let files = document.getElementById("photo").files;

if(date=="" || subject=="" || notes=="" || parent==""){
alert("Please fill all fields");
return;
}

let imageUrls = [];

for(let file of files){
let storageRef = storage.ref("notes/"+Date.now()+file.name);
await storageRef.put(file);
let url = await storageRef.getDownloadURL();
imageUrls.push(url);
}

await db.collection("notes").add({
date,
subject,
notes,
parent,
images:imageUrls
});

alert("Notes uploaded successfully!");

// Clear form
document.getElementById("date").value = "";
document.getElementById("subject").value = "";
document.getElementById("notes").value = "";
document.getElementById("parent").value = "";
document.getElementById("photo").value = "";

// Go to notes page
loadNotes();
}

// LOAD NOTES
async function loadNotes(){

let snapshot = await db.collection("notes").get();

let html = `<h2>Daily Notes</h2>`;

if(snapshot.empty){
html += "<p>No notes uploaded yet.</p>";
}

snapshot.forEach(doc => {
let note = doc.data();

html += `
<div class="note">
<b>Date:</b> ${note.date}<br>
<b>Subject:</b> ${note.subject}<br>
<b>Notes:</b> ${note.notes}<br>
<b>Parent:</b> ${note.parent}<br>
`;

if(note.images){
note.images.forEach(img=>{
html += `<img src="${img}" class="note-image">`;
});
}

html += `</div>`;
});

document.getElementById("content").innerHTML = html;
}

// START
showHome();

</script>

</body>
</html>
